name: Foil Experiments Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "foil-board-optimizer/viewer.html"
      - "foil-board-optimizer/force_viewer.html"
      - "foil-board-optimizer/comparison.html"
      - "hydrofoil/mockup.html"
      - "foil-insert-load-comparison/**"
      - ".github/workflows/foil-insert-load-comparison-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: foil-insert-comparison-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Refresh embedded apps
        run: bash site/refresh-embeds.sh
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
